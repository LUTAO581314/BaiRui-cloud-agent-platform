name: Platform CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Reject committed credentials
        shell: bash
        run: |
          if git grep -I -n -E '(gho_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|-----BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY-----)' -- ':!*.md' ':!*.example'; then
            echo "Potential credential found in tracked source"
            exit 1
          fi
      - run: npm run verify

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: true
      - name: Build production platform image
        run: docker build -t bairui-platform:${{ github.sha }} .
      - name: Validate production composition
        env:
          POSTGRES_PASSWORD: ci-database-password
          BAIRUI_PLATFORM_ORIGIN: https://platform.example.test
          BAIRUI_SESSION_SECRET: ci-session-secret-at-least-32-characters
          BAIRUI_BOOTSTRAP_ADMIN_EMAIL: admin@example.test
          BAIRUI_BOOTSTRAP_ADMIN_PASSWORD: ci-bootstrap-password-at-least-12
          BAIRUI_AGENT_INGEST_TOKEN: ci-agent-ingest-token
          BAIRUI_CHANNEL_WORKER_TOKEN: ci-channel-worker-token-at-least-32-characters
          BAIRUI_RUNTIME_SHARED_SECRET: ci-runtime-secret-at-least-32-characters
          BAIRUI_PROVIDER_ENCRYPTION_KEY: ci-provider-encryption-key-at-least-32-characters
          BAIRUI_LICENSE_PRIVATE_KEY: ci-placeholder-only-compose-validation
        run: docker compose -f infra/docker-compose.yml config --quiet

  distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate installer shell
        run: |
          bash -n distribution/install.sh
          shellcheck distribution/install.sh
      - name: Build and verify a digest-pinned distribution fixture
        env:
          BAIRUI_RELEASE_VERSION: 0.1.0-rc.1
          BAIRUI_RELEASE_GENERATED_AT: 2026-07-17T00:00:00.000Z
          BAIRUI_CONTRACTS_VERSION: 1.2.0
          BAIRUI_PLATFORM_COMMIT: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          BAIRUI_AGENT_COMMIT: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          BAIRUI_HERMES_COMMIT: cccccccccccccccccccccccccccccccccccccccc
          BAIRUI_BAILONGMA_COMMIT: dddddddddddddddddddddddddddddddddddddddd
          BAIRUI_PLATFORM_IMAGE: ghcr.io/lutao581314/bairui-platform@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          BAIRUI_RUNTIME_IMAGE: ghcr.io/lutao581314/bairui-runtime@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          BAIRUI_HERMES_IMAGE: ghcr.io/lutao581314/bairui-hermes@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          BAIRUI_POSTGRES_IMAGE: docker.io/library/postgres:17-alpine@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
          BAIRUI_CADDY_IMAGE: docker.io/library/caddy:2-alpine@sha256:eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
          BAIRUI_DATABASE_MIGRATION: 018_durable_channel_delivery.sql
        run: |
          mkdir -p dist/bundle
          node distribution/bin/build-manifest.mjs dist/bundle/release-manifest.json
          node distribution/bin/verify-manifest.mjs dist/bundle/release-manifest.json
          cp distribution/compose.yaml distribution/Caddyfile dist/bundle/
          BAIRUI_BUNDLE_DIR="$PWD/dist/bundle" bash distribution/install.sh --verify-only --version 0.1.0-rc.1

  postgres-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: bairui_ci
          POSTGRES_USER: bairui
          POSTGRES_PASSWORD: ci-database-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bairui -d bairui_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://bairui:ci-database-password@127.0.0.1:5432/bairui_ci
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:schema:check
      - name: Exercise PostgreSQL control transactions
        env:
          BAIRUI_POSTGRES_INTEGRATION: "1"
        run: node --test tests/postgres-control.test.mjs

  browser-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Exercise BaiLongma, Hermes, Obsidian and RBAC browser flows
        run: npm run test:browser:remote
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-browser-acceptance-${{ github.sha }}
          path: test-results/remote-browser-acceptance
          if-no-files-found: warn
          retention-days: 14
